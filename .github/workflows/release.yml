name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.0.1). Leave empty to use latest tag.'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION_NAME="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF##*/}"
            VERSION_NAME="${TAG#v}"
          fi
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Write local.properties
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          CORPUS_UPLOAD_SECRET: ${{ secrets.CORPUS_UPLOAD_SECRET }}
        run: |
          cat > local.properties <<EOF
          DASHSCOPE_API_KEY=$DASHSCOPE_API_KEY
          GITHUB_OWNER=${{ github.repository_owner }}
          GITHUB_REPO=${{ github.event.repository.name }}
          CORPUS_REPO=yhLang/XingShuHelper-Corpus
          CORPUS_BRANCH=main
          CORPUS_UPLOAD_URL=https://xingshuuploader-qkullsprlf.cn-hangzhou.fcapp.run/
          CORPUS_UPLOAD_SECRET=$CORPUS_UPLOAD_SECRET
          EOF

      - name: Grant gradlew exec
        run: chmod +x ./gradlew

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease \
            -PversionName=${{ steps.ver.outputs.name }} \
            -PversionCode=${{ steps.ver.outputs.code }} \
            -PreleaseStoreFile=$KEYSTORE_PATH \
            -PreleaseStorePassword=$KEYSTORE_PASSWORD \
            -PreleaseKeyAlias=$KEY_ALIAS \
            -PreleaseKeyPassword=$KEY_PASSWORD

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          OUT="XingShuHelper-${{ steps.ver.outputs.name }}.apk"
          cp "$APK" "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name != '' && github.ref_name || format('v{0}', steps.ver.outputs.name) }}
          name: ${{ format('v{0}', steps.ver.outputs.name) }}
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
